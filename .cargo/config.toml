# Use LLD linker for faster release builds on macOS.
# Requires: brew install lld
# On Apple Silicon: /opt/homebrew/opt/lld/bin/ld64.lld
# On Intel:         /usr/local/opt/lld/bin/ld64.lld
#
# If lld is not installed, remove or comment out the linker lines.

# LLD disabled — brew-installed lld doesn't support macOS linker flags.
# Using default Apple system linker instead.
# [target.aarch64-apple-darwin]
# linker = "/opt/homebrew/opt/lld/bin/ld64.lld"
#
# [target.x86_64-apple-darwin]
# linker = "/usr/local/opt/lld/bin/ld64.lld"
