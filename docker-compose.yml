# Locus-OS · full dev stack (frontend + backend + Neo4j).
#
# Quick start:
#   1. cp .env.example .env  (set NEO4J_PASSWORD)
#   2. docker compose up --build
#
# Services
#   frontend  → http://127.0.0.1:1420   (Vite dev server)
#   backend   → http://127.0.0.1:4000   (GraphQL API)
#   neo4j     → http://127.0.0.1:7474   (Browser UI)
#               bolt://127.0.0.1:7687   (Bolt)
#
# All ports are bound to 127.0.0.1 only.

services:

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:1420:1420"
    depends_on:
      - backend

  # ── Storybook (opt-in) ────────────────────────────────────────────────────
  # Only starts when explicitly requested:
  #   docker compose --profile storybook up
  storybook:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    profiles: ["storybook"]
    ports:
      - "127.0.0.1:6006:6006"
    command: ["npm", "run", "storybook", "--", "--host", "0.0.0.0", "--no-open"]

  # ── Backend (GraphQL API — no Tauri, pure Rust + axum) ───────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      LOCUS_HTTP_ADDR: "0.0.0.0:4000"
      LOCUS_ALLOW_REMOTE: "1"
    depends_on:
      neo4j:
        condition: service_healthy

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:latest
    container_name: locus-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7475:7474"   # Browser UI (7474 taken by Neo4j Desktop)
      - "127.0.0.1:7688:7687"   # Bolt (7687 taken by Neo4j Desktop)
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - locus-neo4j-data:/data
      - locus-neo4j-logs:/logs
      - ./crates/spaces-core/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "neo4j status | grep -q running || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  locus-neo4j-data:
  locus-neo4j-logs:
