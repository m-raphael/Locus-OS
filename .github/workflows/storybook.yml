# Build Storybook and publish it to GitHub Pages.
#
# Zeroheight embeds the live previews via the resulting Pages URL, e.g.
#   https://<owner>.github.io/<repo>/iframe.html?id=design-system-glassmodule--default
#
# Pre-req: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: storybook

on:
  push:
    branches: [main]
    paths:
      - "src/design/**"
      - "src/components/**"
      - "tokens/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/storybook.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint design tokens (DTCG ↔ CSS drift)
        run: npm run tokens:lint

      - name: Build Storybook
        run: npm run build-storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
